<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | github issue tracker</title>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- daisyUI + tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<bodyclass="bg-[#F8FAFC] p-9>

    <main class="bg-white p-8 w-5/12 m-auto text-center shadow-2xl">
        <div class="logo flex flex-col items-center">
            <img class="mb-6" src="./assets/github-logo.png" alt="">
            <p class="font-semibold text-2xl">GitHub Issues Tracker</p>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div id="user-data" class="flex flex-col gap-1">
            <label class="label font-medium text-[#1F2937]">Username</label>
            <input id="user-name" type="text" class="input mb-2 w-full" placeholder="Enter Username" />
            <label class="label font-medium text-[#1F2937]">Password</label>
            <input id="password" type="password" class="input w-full" placeholder="Password" />
            <button id="login-btn" class="btn btn-primary mt-4">Sign in</button>
        </div>
        <div class="demo">
            <div class="my-6 flex items-center">
                <hr class="text-[#E4E4E7] w-3/6">
                <p>OR</p>
                <hr class="text-[#E4E4E7] w-3/6">
            </div>
            <div class="flex flex-col gap-6">
                <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
                <p class="text-[14px]"><span class="font-semibold">Username:</span> admin<br><span
                        class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </main>
    <!-- JS er angta  -->
    <script src="./login.js"></script>
    </body>

</html>
