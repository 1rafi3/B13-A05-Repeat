    <!-- daisyUI + tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;

<body class="bg-[#F8FAFC]">
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
            <div class="flex items-center gap-1">
                <a href=""><img class="w-9 h-9" src="./assets/github-logo.png" alt=""></a>
                <a class="text-2xl font-semibold">GitHub Issues Tracker</a>
            </div>
        </div>
        <div class="flex gap-2">
            <div class="flex items-center relative left-10 opacity-50"><i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input id="input-text" type="text" placeholder="Search issues..." class="rounded pl-8 text-[#64748B] p-2.5">
            <button class="border p-3 rounded bg-[#4A00FF] hover:cursor-pointer text-white"><i
                    class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </div>

    <section class="w-10/12 m-auto mt-16">

        <!-- toogle button  -->
        <div id="toggle-button" class="p-6 bg-white shadow-2xl mb-4 rounded">
            <button onclick="showAll(); btnController(allBtn)" id="allBtn" class="btn btn-primary w-1/10">All</button>
            <button onclick="showOpen(); btnController(openBtn)" id="openBtn" class="btn w-1/10">Open</button>
            <button onclick="showClose(); btnController(closed)" id="closed" class="btn w-1/10">Closed</button>
        </div>
        <!-- Issue Tracker  -->
        <div class="rounded shadow-2xl bg-white p-6 flex justify-between items-center">
            <div class="flex gap-2">
                <div class="bg-[#ECE4FF] w-14 p-2 flex justify-center rounded-full"><img src="./assets/Aperture.png"
                        alt="">
                </div>
                <div>
                    <p class="font-semibold text-[20px]"><span id="issue-counter">50</span> Issues</p>
                    <p class="text-[#64748B] text-[20px]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4">
                <p><i class="fa-solid fa-circle" style="color: rgb(0, 169, 110);"></i>Open</p>
                <p><i class="fa-solid fa-circle" style="color: rgb(168, 85, 247);"></i>Closed</p>
            </div>
        </div>

        <!-- cards -->

        <div class="shadow-2xl bg-[#FBFBFB] my-1 rounded">

            <!-- card  -->
            <div id="modal" class="">
                <dialog id="issueDetailsModal" class="modal">
                    <div class="modal-box">
                        <h1 id="modal-title">Title</h1>
                        <div id="modal-description" class="flex gap-2 items-center justify-start">
                            <div><button class="btn btn-primary">Opened</button></div>
                            <div class="border h-1 w-1 rounded-2xl border-[#64748B]"></div>
                            <div><p>Opened By Fahim Ahmed</p></div>
                            <div class="border h-1 w-1 rounded-2xl border-[#64748B]"></div>
                            <div><p>22/12/2023</p></div>
                        </div>
                        <div id="modal-label" class="my-6">
                            <button class="btn btn-soft btn-secondary rounded-4xl">High</button>
                            <button class="btn btn-soft btn-secondary rounded-4xl">High</button>
                        </div>
                        <div>
                            <p id="modal-content">Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime totam quis, perspiciatis quaerat modi beatae?</p>
                        </div>
                        <div class="flex justify-between p-4 bg-[#F8FAFC] rounded-2xl my-6">
                            <div>
                                <p>Assignee: </p>
                                <p id="modal-assignee-name">Fahim Ahmed</p>
                            </div>
                            <div>
                                <p id="modal-priority">Priority:</p>
                                <button id="modal-button" class="btn btn-soft btn-secondary rounded-4xl">High</button>
                            </div>
                        </div>
                        <div class="flex justify-end">
                            <button class="btn btn-primary" onclick="issueDetailsModal.close()">Close</button>
                        </div>
                    </div>
                </dialog>
            </div>

            <!-- grid-cols-[repeat(auto-fit,minmax(280px,1fr))] === eita diye bujhay j jotota card paro create koro ebong oi gulake auto fit koro shorbonimno size hote parbe 280px ekta card er 1 fr jaygay but jdi jayga thake tahole stretch koro stretch korar kaj ta auto fit e korbe maybe idk -->

    </section>
